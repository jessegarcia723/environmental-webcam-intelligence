project:
  name: mount_tam_marine_layer
  database_path: ../data/mount_tam.sqlite3
  data_dir: ../data

cameras:
  - id: mount_tam_east_peak
    name: Mount Tam East Peak
    location:
      latitude: 37.9235
      longitude: -122.5965
      elevation_m: 784
      timezone: America/Los_Angeles
    capture:
      # Source page:
      # https://www.rntl.net/mt-tam-cam-tamalpais-webcam/
      source: manifest_frames
      image_url: "https://cameras.alertcalifornia.org/public-camera-data/Axis-TamEast/latest-frame.jpg"
      interval_seconds: 3600
      timeout_seconds: 20
      user_agent: "enviro-webcam-ml/0.1 (+local research MVP)"
      manifest:
        url: "https://cameras.alertcalifornia.org/public-camera-data/Axis-TamEast/1min/12-hour.json"
        frame_url_template: "https://cameras.alertcalifornia.org/public-camera-data/Axis-TamEast/1min/{frame}"
        frames_key: frames
        timestamp_source: filename_epoch
        filename_suffix: ".jpg"
        min_frame_spacing_seconds: 300
        skip_existing: true
    pose:
      version: "initial"
      description: "ALERTCalifornia Axis-TamEast rolling 12-hour manifest frames."

  - id: mount_tam_west_peak
    name: Mount Tam West Peak
    location:
      latitude: 37.9235
      longitude: -122.5965
      elevation_m: 784
      timezone: America/Los_Angeles
    capture:
      # Source page:
      # https://www.rntl.net/mt-tam-cam-tamalpais-webcam/
      source: manifest_frames
      image_url: "https://cameras.alertcalifornia.org/public-camera-data/Axis-TamWest/latest-frame.jpg"
      interval_seconds: 3600
      timeout_seconds: 20
      user_agent: "enviro-webcam-ml/0.1 (+local research MVP)"
      manifest:
        url: "https://cameras.alertcalifornia.org/public-camera-data/Axis-TamWest/1min/12-hour.json"
        frame_url_template: "https://cameras.alertcalifornia.org/public-camera-data/Axis-TamWest/1min/{frame}"
        frames_key: frames
        timestamp_source: filename_epoch
        filename_suffix: ".jpg"
        min_frame_spacing_seconds: 300
        skip_existing: true
    pose:
      version: "initial"
      description: "ALERTCalifornia Axis-TamWest rolling 12-hour manifest frames."

weather:
  provider: open_meteo
  timezone: UTC
  fetch_interval_seconds: 3600
  fetch_on_start: true
  past_days: 2
  forecast_days: 7
  hourly_variables:
    - temperature_2m
    - relative_humidity_2m
    - dew_point_2m
    - precipitation
    - rain
    - cloud_cover
    - cloud_cover_low
    - cloud_cover_mid
    - cloud_cover_high
    - boundary_layer_height
    - freezing_level_height
    - cloud_cover_1000hPa
    - cloud_cover_975hPa
    - cloud_cover_950hPa
    - geopotential_height_1000hPa
    - geopotential_height_975hPa
    - geopotential_height_950hPa
    - pressure_msl
    - surface_pressure
    - wind_speed_10m
    - wind_direction_10m

quality:
  night_luminance_threshold: 35
  blur_variance_threshold: 25

collector:
  clock_sanity:
    enabled: true
    # If system wall-clock time disagrees with monotonic elapsed time by more
    # than this, skip the cycle instead of writing bad timestamps.
    max_drift_seconds: 120
    max_backward_seconds: 1
    retry_seconds: 60

tasks:
  - id: marine_layer_detection
    default: true
    output_slug: marine_layer_detection
    training_csv: ../data/training/marine_layer_detection_training.csv
    model_dir: ../data/models/marine_layer_detection
    image_preprocessing:
      crop_pixels:
        top: 160
        bottom: 31
    labels:
      - clouds_below_peak
      - no_clouds_below_peak
      - peak_obscured
      - below_peak_height_far_from_peak
      - night_unusable
      - camera_artifact
    positive_label: clouds_below_peak
    negative_labels:
      - no_clouds_below_peak
    uncertain_labels:
      - below_peak_height_far_from_peak
      - night_unusable
      - camera_artifact
    obscured_labels:
      - peak_obscured
    excluded_training_labels:
      - night_unusable
      - camera_artifact
    comparison_groups:
      camera:
        - mount_tam_east_peak
        - mount_tam_west_peak
